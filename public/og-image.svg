<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1000" cy="200" r="250" fill="#818CF8" opacity="0.15" />
  <circle cx="200" cy="1000" r="200" fill="#818CF8" opacity="0.15" />

  <!-- Company name -->
  <text x="600" y="380" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="6">TRYDENTT</text>

  <!-- Tagline -->
  <text x="600" y="460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="#C7D2FE" text-anchor="middle" letter-spacing="8">CLEANING SERVICES</text>

  <!-- Divider line -->
  <rect x="400" y="500" width="400" height="3" fill="#818CF8" opacity="0.5" rx="1.5" />

  <!-- Services -->
  <text x="600" y="570" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#E0E7FF" text-anchor="middle">House Cleaning  |  Office Cleaning  |  Deep Cleaning</text>

  <!-- Location -->
  <text x="600" y="640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#A5B4FC" text-anchor="middle">London, Ontario &amp; Surrounding Areas</text>

  <!-- Trust badges -->
  <text x="600" y="740" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="white" text-anchor="middle" opacity="0.9">Eco-Friendly  ·  Fully Insured  ·  100% Satisfaction Guarantee</text>

  <!-- Phone -->
  <text x="600" y="820" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="white" text-anchor="middle">(519) 871-3368</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="1180" width="1200" height="20" fill="#818CF8" opacity="0.4" />
</svg>
